name: Deploy IIS index.html

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: [self-hosted, windows, web-prod]

    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4

      - name: Validate source file
        shell: powershell
        run: |
          if (-not (Test-Path ".\index.html")) {
            Write-Error "index.html not found in repository root."
            exit 1
          }

      - name: Backup existing file
        shell: powershell
        run: |
          $target = "C:\inetpub\wwwroot\index.html"
          if (Test-Path $target) {
            $backupDir = "C:\deploy-backup"
            if (-not (Test-Path $backupDir)) {
              New-Item -ItemType Directory -Path $backupDir | Out-Null
            }
            $timestamp = Get-Date -Format "yyyyMMdd_HHmmss"
            Copy-Item $target "$backupDir\index_$timestamp.html" -Force
          }

      - name: Deploy index.html
        shell: powershell
        run: |
          $target = "C:\inetpub\wwwroot\index.html"
          Copy-Item ".\index.html" $target -Force

      - name: Verify deployment
        shell: powershell
        run: |
          $target = "C:\inetpub\wwwroot\index.html"
          if (-not (Test-Path $target)) {
            Write-Error "Deployment failed. Target file not found."
            exit 1
          }

          Get-Item $target | Format-List FullName, Length, LastWriteTime

      - name: Emit deployment summary
        if: always()
        shell: powershell
        run: |
          "Deployment completed." >> $env:GITHUB_STEP_SUMMARY
          "Branch: ${{ github.ref_name }}" >> $env:GITHUB_STEP_SUMMARY
          "Commit: ${{ github.sha }}" >> $env:GITHUB_STEP_SUMMARY
          "Target path: C:\inetpub\wwwroot\index.html" >> $env:GITHUB_STEP_SUMMARY
